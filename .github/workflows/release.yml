name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: metriqos-linux-x64
          - os: windows-latest
            artifact: metriqos-windows-x64
          - os: macos-latest
            artifact: metriqos-macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DMETRIQOS_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p pkg/include pkg/lib
          cp -r include/metriqos pkg/include/
          cp build/libmetriqos.a pkg/lib/
          tar -czf ${{ matrix.artifact }}.tar.gz -C pkg .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p pkg/include pkg/lib
          cp -r include/metriqos pkg/include/
          cp build/Release/metriqos.lib pkg/lib/
          tar -czf ${{ matrix.artifact }}.tar.gz -C pkg .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
